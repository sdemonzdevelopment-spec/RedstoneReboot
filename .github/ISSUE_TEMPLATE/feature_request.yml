name: 💡 Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would this feature benefit you or your server?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Relevant Platform(s)
      multiple: true
      options:
        - All
        - Bukkit/Spigot/Paper
        - Folia
        - Fabric
        - Forge
        - NeoForge
    validations:
      required: true
