name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Upload Build Artifacts
        if: matrix.java == 17
        uses: actions/upload-artifact@v4
        with:
          name: RedstoneReboot-Build-Artifacts
          path: |
            bukkit/build/libs/RedstoneReboot-Bukkit-*.jar
            folia/build/libs/RedstoneReboot-Folia-*.jar
            fabric/build/libs/RedstoneReboot-Fabric-*.jar
            forge/build/libs/RedstoneReboot-Forge-*.jar
            neoforge/build/libs/RedstoneReboot-NeoForge-*.jar
            common/build/libs/common-*.jar
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: RedstoneReboot-Build-Artifacts
          path: artifacts

      - name: List Artifacts
        run: find artifacts -type f -name "*.jar" | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RedstoneReboot ${{ github.ref_name }}
          body: |
            ## ⚡ RedstoneReboot ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Bukkit / Spigot / Paper | `RedstoneReboot-Bukkit-*.jar` |
            | Folia | `RedstoneReboot-Folia-*.jar` |
            | Fabric | `RedstoneReboot-Fabric-*.jar` |
            | Forge | `RedstoneReboot-Forge-*.jar` |
            | NeoForge | `RedstoneReboot-NeoForge-*.jar` |

            ### Requirements
            - **Bukkit/Paper**: MC 1.9 — 1.21.1 · Java 8+ (legacy) / Java 17+ (modern)
            - **Folia**: MC 1.20+ · Java 17+
            - **Fabric/Forge/NeoForge**: MC 1.20.4+ · Java 17+

            ### Links
            - 📖 [Documentation](https://github.com/sdemonzdevelopment-spec/RedstoneReboot/wiki)
            - 🛠️ [Developer API](https://github.com/sdemonzdevelopment-spec/RedstoneReboot/blob/main/docs/api/README.md)
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
